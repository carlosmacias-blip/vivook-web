<!--
  Sprite SVG centralizado de Vivook.

  Uso:
    <svg class="icon"><use href="assets/icons.svg#nombre-del-icono"/></svg>

  Los iconos usan stroke="currentColor", así que se pintan con el color CSS
  del padre. La mayoría tiene viewBox="0 0 24 24" excepto caret-down (20x20).

  Para agregar un nuevo icono: copia un <symbol> existente, cambia el id y
  el contenido. Mantén el mismo estilo (outline, 24×24, stroke-width 2).
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;" aria-hidden="true">

